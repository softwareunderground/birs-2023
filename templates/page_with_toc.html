{% extends "page.html" %}

{% block main %}

<h1>{{ page.title }}</h1>

<div class="dflex flex-row">
  <div class="page-content">
    {{ page.content | safe }}
  </div>

  <aside class="toc">
    <nav>
    <ul>
      {% for heading in page.toc %}
          <li>
            <a href="{{ heading.permalink | safe }}">{{ heading.title }}</a>
          </li>
      {% endfor %}
    </ul>
    </nav>
  </aside>

</div>

{% endblock main %}
